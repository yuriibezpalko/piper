# msposd runtime config — sourced by /etc/init.d/S96msposd
# UART that msposd reads MAVLink/MSP from. Adjust per board wiring.
MASTER="/dev/ttyS2"
BAUD=115200

# OSD options — see https://github.com/OpenIPC/msposd
#   -c <CHAN>   show RC channels in OSD
#   --osd       enable OSD overlay
#   -r <FPS>    refresh rate
#   --ahi 1     enable artificial horizon
OSD_OPTS="-c 7 -c 9 --osd -r 20 --ahi 1"
