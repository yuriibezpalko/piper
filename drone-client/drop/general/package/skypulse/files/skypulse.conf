# skypulse-drone runtime config
# WireGuard mesh: VPS=10.8.0.1, Camera=10.8.0.2, GCS=10.8.0.3

host=10.8.0.3
control_port=2223
caminfo_port=2224

# SSC30KQ/SSC338Q: RCIN/FC UART is on ttyS3
uart_dev=/dev/ttyS3
uart_baud=420000

STABILIZE_TIMEOUT=250
FAILSAFE_TIMEOUT=5000
LOCAL_TIMEOUT=300000
ELRS_SWITCH_PIN=0
