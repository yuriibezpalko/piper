# Camera (skypulse peer) WireGuard config
# VPS is running wg-easy at your server IP
# Camera gets IP 10.8.0.2

[Interface]
PrivateKey = <CAMERA_PRIVATE_KEY>
# PresharedKey is optional but your wg-easy config uses it
# Get camera private key from wg-easy UI when you add the peer

[Peer]
PublicKey = <VPS_PUBLIC_KEY_FROM_WG_EASY>
PresharedKey = jNroFS2/NwU7Xik/+MeEP54ZlJ9pXidkBqCSHtfr960=
AllowedIPs = 10.8.0.0/24
Endpoint = <YOUR_VPS_IP>:51820
PersistentKeepalive = 25
