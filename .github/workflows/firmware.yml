name: firmware

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'drone-client/**'
      - '.github/workflows/firmware.yml'
  pull_request:
    paths:
      - 'drone-client/**'
  workflow_dispatch:
    inputs:
      board:
        description: 'Board to build (defaults to all in matrix)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        board:
          - ssc338q_skypulse
          - ssc30kq_skypulse

    steps:
      - uses: actions/checkout@v4

      - name: Skip non-selected board (manual dispatch)
        if: github.event_name == 'workflow_dispatch' && inputs.board != '' && inputs.board != matrix.board
        run: echo "skipping" && exit 0

      - name: Install buildroot deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            automake autotools-dev bc build-essential cpio curl file git \
            libncurses-dev libtool lzop make rsync unzip wget libssl-dev \
            ca-certificates python3 bison flex gawk perl xxd \
            u-boot-tools device-tree-compiler whiptail

      # Cache the OpenIPC clone so we don't re-clone 60MB each run.
      - name: Cache OpenIPC clone
        uses: actions/cache@v4
        with:
          path: drone-client/drop/.openipc
          key: openipc-firmware-${{ hashFiles('.github/workflows/firmware.yml') }}

      # Cache the buildroot tree (toolchain + downloaded sources). This is the
      # big win — first build ~45min, cached builds ~5–10min.
      - name: Cache buildroot output (toolchain, downloads, build state)
        uses: actions/cache@v4
        with:
          path: |
            drone-client/drop/output/buildroot-2024.02.10
            drone-client/drop/output/per-package
            drone-client/drop/output/build
            drone-client/drop/output/host
            drone-client/drop/output/dl
          key: buildroot-${{ matrix.board }}-${{ hashFiles('drone-client/drop/br-ext-chip-sigmastar/configs/*_defconfig') }}
          restore-keys: |
            buildroot-${{ matrix.board }}-

      - name: Build firmware (BOARD=${{ matrix.board }})
        working-directory: drone-client/drop
        env:
          JOBS: 4   # GH runners are 2-core but burst well; 4 is sweet spot
        run: |
          make BOARD=${{ matrix.board }}

      - name: List artefacts
        if: always()
        working-directory: drone-client/drop
        run: |
          ls -lh output/images/ 2>/dev/null || true

      - name: Upload firmware archive
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board }}
          path: |
            drone-client/drop/output/images/openipc.*-fpv.tgz
            drone-client/drop/output/images/rootfs.*
            drone-client/drop/output/images/uImage.*
          if-no-files-found: warn
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.board }}
          path: |
            drone-client/drop/output/build/*/.stamp_*
            drone-client/drop/build.log
          if-no-files-found: ignore
          retention-days: 7

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artefacts
          pattern: firmware-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artefacts/openipc.*-fpv.tgz
          generate_release_notes: true
