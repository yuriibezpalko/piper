<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyPulse GCS</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Top bar ── */
  #topbar {
    background: #111;
    border-bottom: 1px solid #222;
    padding: 6px 14px;
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 13px;
    flex-shrink: 0;
  }
  #topbar .logo { color: #4af; font-weight: bold; font-size: 15px; letter-spacing: 2px; }
  .status-pill {
    padding: 2px 10px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: bold;
  }
  .pill-armed   { background: #1a3a1a; color: #4f4; border: 1px solid #4f4; }
  .pill-disarmed{ background: #3a1a1a; color: #f44; border: 1px solid #f44; }
  .pill-fs      { background: #3a2a00; color: #fa4; border: 1px solid #fa4; }
  .sep { color: #333; }

  /* ── Main layout ── */
  #main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 320px;
    grid-template-rows: 1fr;
    gap: 0;
    overflow: hidden;
  }

  /* ── Video + OSD pane ── */
  #video-pane {
    position: relative;
    background: #000;
    overflow: hidden;
  }
  #video-canvas {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  #osd-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  #no-video {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #333;
    font-size: 18px;
    text-align: center;
  }

  /* ── Right panel ── */
  #right-panel {
    background: #0d0d0d;
    border-left: 1px solid #1a1a1a;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Map ── */
  #map-container {
    flex: 1;
    position: relative;
    min-height: 0;
  }
  #map {
    width: 100%;
    height: 100%;
  }

  /* ── Telemetry panel ── */
  #telem-panel {
    flex-shrink: 0;
    padding: 10px 14px;
    border-top: 1px solid #1a1a1a;
    font-size: 12px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 16px;
  }
  .telem-row { display: flex; justify-content: space-between; }
  .telem-label { color: #555; }
  .telem-val   { color: #ccc; font-weight: bold; }
  .telem-val.warn  { color: #fa4; }
  .telem-val.crit  { color: #f44; }
  .telem-val.ok    { color: #4f4; }

  /* ── WS status dot ── */
  #ws-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #333;
    display: inline-block;
    margin-right: 4px;
  }
  #ws-dot.connected { background: #4f4; }
  #ws-dot.error     { background: #f44; }

  /* ── Failsafe overlay ── */
  #fs-overlay {
    display: none;
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }
</style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <span class="logo">⬡ SKYPULSE</span>
  <span id="arm-pill" class="status-pill pill-disarmed">DISARMED</span>
  <span id="mode-badge">—</span>
  <span class="sep">|</span>
  <span id="link-status">🔗 <span id="ws-dot"></span><span id="ws-label">Connecting…</span></span>
  <span class="sep">|</span>
  <span id="lq-display">LQ: —</span>
  <span id="rssi-display">RSSI: —</span>
</div>

<!-- Main -->
<div id="main">

  <!-- Video + OSD -->
  <div id="video-pane">
    <canvas id="video-canvas"></canvas>
    <canvas id="osd-canvas"></canvas>
    <div id="no-video">📡 Waiting for video stream…</div>
    <canvas id="fs-overlay"></canvas>
  </div>

  <!-- Right: Map + Telemetry -->
  <div id="right-panel">
    <div id="map-container">
      <div id="map"></div>
    </div>
    <div id="telem-panel">
      <div class="telem-row"><span class="telem-label">ALT</span><span class="telem-val" id="t-alt">—</span></div>
      <div class="telem-row"><span class="telem-label">SPD</span><span class="telem-val" id="t-spd">—</span></div>
      <div class="telem-row"><span class="telem-label">VSPD</span><span class="telem-val" id="t-vspd">—</span></div>
      <div class="telem-row"><span class="telem-label">HDG</span><span class="telem-val" id="t-hdg">—</span></div>
      <div class="telem-row"><span class="telem-label">BATT</span><span class="telem-val" id="t-batt">—</span></div>
      <div class="telem-row"><span class="telem-label">CURR</span><span class="telem-val" id="t-curr">—</span></div>
      <div class="telem-row"><span class="telem-label">MAH</span><span class="telem-val" id="t-mah">—</span></div>
      <div class="telem-row"><span class="telem-label">SATS</span><span class="telem-val" id="t-sats">—</span></div>
      <div class="telem-row"><span class="telem-label">LAT</span><span class="telem-val" id="t-lat">—</span></div>
      <div class="telem-row"><span class="telem-label">LON</span><span class="telem-val" id="t-lon">—</span></div>
      <div class="telem-row"><span class="telem-label">PITCH</span><span class="telem-val" id="t-pitch">—</span></div>
      <div class="telem-row"><span class="telem-label">ROLL</span><span class="telem-val" id="t-roll">—</span></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
const state = {
  lat: 0, lon: 0, altitude_m: 0, speed_kmh: 0, heading: 0,
  satellites: 0, gps_fix: false,
  voltage_v: 0, current_a: 0, used_mah: 0, battery_pct: 0,
  cell_count: 0, cell_v: 0, batt_warn: 0,
  pitch_deg: 0, roll_deg: 0, yaw_deg: 0,
  armed: false, flight_mode: 'UNKNOWN', vspeed_ms: 0,
  link_quality: 0, rssi_dbm: 0, failsafe: false,
  home_lat: 0, home_lon: 0, home_set: false,
  home_dist_m: 0, home_bearing: 0,
};

// ═══════════════════════════════════════════════════════
// MAP (Leaflet + OpenStreetMap)
// ═══════════════════════════════════════════════════════
const map = L.map('map', { zoomControl: true, attributionControl: false })
  .setView([0, 0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '© OpenStreetMap'
}).addTo(map);

// Drone marker — custom icon
const droneIcon = L.divIcon({
  html: `<div style="
    width:24px; height:24px;
    background:#4af;
    border:2px solid #fff;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    transform-origin:center;
  " id="drone-icon-inner">✈</div>`,
  iconSize: [24, 24],
  iconAnchor: [12, 12],
  className: '',
});

let droneMarker = null;
let homeMarker  = null;
let mapCentered = false;
let flightPath  = L.polyline([], { color: '#4af', weight: 2, opacity: 0.7 }).addTo(map);
let pathPoints  = [];

const homeIcon = L.divIcon({
  html: `<div style="
    width:20px; height:20px;
    background:#f80;
    border:2px solid #fff;
    border-radius:3px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:10px;
    font-weight:bold;
    color:#fff;
  ">H</div>`,
  iconSize: [20, 20],
  iconAnchor: [10, 10],
  className: '',
});

function updateMap(lat, lon, heading, homeLat, homeLon, homeSet) {
  if (!lat && !lon) return;
  const pos = [lat, lon];

  if (!droneMarker) {
    droneMarker = L.marker(pos, { icon: droneIcon }).addTo(map);
    if (!mapCentered) { map.setView(pos, 15); mapCentered = true; }
  } else {
    droneMarker.setLatLng(pos);
  }

  const inner = document.getElementById('drone-icon-inner');
  if (inner) inner.style.transform = `rotate(${heading}deg)`;

  // Home marker
  if (homeSet && homeLat && homeLon) {
    const hpos = [homeLat, homeLon];
    if (!homeMarker) {
      homeMarker = L.marker(hpos, { icon: homeIcon }).addTo(map);
    } else {
      homeMarker.setLatLng(hpos);
    }
  }

  pathPoints.push(pos);
  if (pathPoints.length > 500) pathPoints.shift();
  flightPath.setLatLngs(pathPoints);
}

// ═══════════════════════════════════════════════════════
// OSD CANVAS
// ═══════════════════════════════════════════════════════
const osdCanvas = document.getElementById('osd-canvas');
const osdCtx    = osdCanvas.getContext('2d');

function resizeOsd() {
  const pane = document.getElementById('video-pane');
  osdCanvas.width  = pane.clientWidth;
  osdCanvas.height = pane.clientHeight;
}
window.addEventListener('resize', resizeOsd);
resizeOsd();

// ── Video rect calculation ────────────────────────────
// Computes the actual rendered video area inside the pane,
// accounting for letterbox (black bars top/bottom) or
// pillarbox (black bars left/right) from object-fit:contain.
//
// Returns { x, y, w, h } — the pixel rect of the video image
// within the OSD canvas coordinate space.
//
// When no video has been decoded yet, videoCanvas.width/height
// are 0 — fall back to full pane so OSD is still visible.

function getVideoRect() {
  const paneW = osdCanvas.width;
  const paneH = osdCanvas.height;

  const vidW = videoCanvas.width  || paneW;
  const vidH = videoCanvas.height || paneH;

  // Scale to fit pane while preserving aspect ratio (object-fit: contain)
  const scale = Math.min(paneW / vidW, paneH / vidH);
  const drawW = vidW * scale;
  const drawH = vidH * scale;

  // Centre in pane (letterbox / pillarbox offset)
  const x = (paneW - drawW) / 2;
  const y = (paneH - drawH) / 2;

  return { x, y, w: drawW, h: drawH };
}

// ── Shared draw helpers ───────────────────────────────

function drawText(text, x, y, color, size, align = 'left') {
  osdCtx.font = `bold ${size}px "Courier New", monospace`;
  osdCtx.textAlign = align;
  osdCtx.fillStyle = 'rgba(0,0,0,0.6)';
  osdCtx.fillText(text, x + 1, y + 1);
  osdCtx.fillStyle = color;
  osdCtx.fillText(text, x, y);
}

function osdLine(x1, y1, x2, y2, color, width = 1.5) {
  osdCtx.beginPath();
  osdCtx.strokeStyle = color;
  osdCtx.lineWidth = width;
  osdCtx.moveTo(x1, y1);
  osdCtx.lineTo(x2, y2);
  osdCtx.stroke();
}

// ── Main OSD draw loop ────────────────────────────────

function drawOsd() {
  const paneW = osdCanvas.width;
  const paneH = osdCanvas.height;
  osdCtx.clearRect(0, 0, paneW, paneH);

  // All OSD coordinates are relative to the video rect, not the pane.
  // This ensures nothing draws on black bars.
  const vr = getVideoRect();   // { x, y, w, h }
  const W  = vr.w;
  const H  = vr.h;
  const cx = vr.x + W / 2;    // centre x in pane coords
  const cy = vr.y + H / 2;    // centre y in pane coords

  const t = Date.now();
  const s = state;

  // Clip strictly to video rect — nothing escapes into black bars
  osdCtx.save();
  osdCtx.beginPath();
  osdCtx.rect(vr.x, vr.y, W, H);
  osdCtx.clip();

  // ── Artificial horizon ──
  drawHorizon(cx, cy, s.roll_deg, s.pitch_deg, W, H);

  // ── Bank angle arc + roll indicator ──
  drawBankArc(cx, cy, s.roll_deg, H);

  // ── Scrolling altitude tape (right) ──
  const TAPE_W = 52, TAPE_H = Math.round(H * 0.42);
  drawAltTape(vr.x + W - TAPE_W - 36, cy, TAPE_W, TAPE_H, s.altitude_m);

  // ── Vario bar (far right) ──
  drawVarioBar(vr.x + W - 22, cy, 14, TAPE_H, s.vspeed_ms);

  // ── Scrolling speed tape (left) ──
  drawSpeedTape(vr.x + 36, cy, TAPE_W, TAPE_H, s.speed_kmh);

  // ── Throttle bar (far left) ──
  drawThrottleBar(vr.x + 18, cy, 14, TAPE_H, s.vspeed_ms);

  osdCtx.restore();

  // ── Failsafe pulse border — follows video rect edge ──
  if (s.failsafe) {
    const alpha = 0.4 + 0.35 * Math.sin(t / 250);
    osdCtx.strokeStyle = `rgba(255,80,0,${alpha})`;
    osdCtx.lineWidth = 8;
    osdCtx.strokeRect(vr.x + 4, vr.y + 4, W - 8, H - 8);
    drawText('⚠  FAILSAFE — LINK LOST', cx, cy - 20, '#fa4', 20, 'center');
  }

  // All text elements below use vr-relative positions

  // ── Top-left: battery ──
  const battColor = s.batt_warn === 2 ? '#f44' : s.batt_warn === 1 ? '#fa4' : '#4f4';
  drawText(`${s.voltage_v.toFixed(1)}V`, vr.x + 12, vr.y + 22, battColor, 16);
  if (s.cell_count > 0) {
    drawText(`${s.cell_v.toFixed(2)}V/${s.cell_count}S`, vr.x + 12, vr.y + 40, battColor, 12);
  } else {
    drawText(`${s.battery_pct}%  ${s.current_a.toFixed(1)}A`, vr.x + 12, vr.y + 40, battColor, 12);
  }
  drawText(`${s.used_mah}mAh  ${s.current_a.toFixed(1)}A`, vr.x + 12, vr.y + 56, '#888', 11);

  // Battery warning flash
  if (s.batt_warn === 2) {
    const a = 0.6 + 0.4 * Math.sin(t / 150);
    drawText('⚠ LAND NOW!', cx, vr.y + H * 0.15, `rgba(255,40,40,${a})`, Math.round(H * 0.055), 'center');
  } else if (s.batt_warn === 1) {
    const a = 0.5 + 0.4 * Math.sin(t / 300);
    drawText('BATTERY LOW', cx, vr.y + H * 0.15, `rgba(255,160,0,${a})`, Math.round(H * 0.04), 'center');
  }

  // ── Top-center: mode + arm ──
  drawText(s.flight_mode, cx, vr.y + 22, s.armed ? '#4f4' : '#888', 16, 'center');
  drawText(s.armed ? 'ARMED' : 'DISARMED', cx, vr.y + 40, s.armed ? '#4f4' : '#f44', 12, 'center');

  // ── Top-right: link + sats ──
  const lqColor = s.link_quality < 50 ? '#f44' : s.link_quality < 70 ? '#fa4' : '#4f4';
  drawText(`LQ ${s.link_quality}%`, vr.x + W - 12, vr.y + 22, lqColor, 14, 'right');
  drawText(`${s.rssi_dbm}dBm`,      vr.x + W - 12, vr.y + 38, '#999', 12, 'right');
  drawText(`${s.satellites} sats`,  vr.x + W - 12, vr.y + 54, s.gps_fix ? '#4f4' : '#f44', 12, 'right');

  // ── Home distance + bearing (bottom-left) ──
  if (s.home_set) {
    const dist = s.home_dist_m < 1000
      ? `H: ${Math.round(s.home_dist_m)}m`
      : `H: ${(s.home_dist_m / 1000).toFixed(2)}km`;
    drawText(dist, vr.x + 12, vr.y + H - 40, '#4af', 13);
    // Arrow pointing toward home relative to current heading
    drawHomeArrow(vr.x + 12, vr.y + H - 20, s.home_bearing, s.heading);
  }

  // ── Compass tape (bottom) ──
  drawCompass(cx, vr.y + H - 46, s.heading, s.home_bearing, s.home_set);

  // ── GPS coords bottom ──
  if (s.gps_fix) {
    drawText(`${s.lat.toFixed(6)},${s.lon.toFixed(6)}`, cx, vr.y + H - 18, '#777', 11, 'center');
  }

  requestAnimationFrame(drawOsd);
}

// ── Betaflight-style artificial horizon ──────────────────────────────────────
// Roll rotates sky/ground + pitch ladder. Fixed crosshair on top.

function drawHorizon(cx, cy, roll, pitch, W, H) {
  const PX_PER_DEG = 4.5;     // pixels per degree of pitch
  const LADDER_W_10 = 70;     // width of 10-degree ladder line (half)
  const LADDER_W_5  = 35;     // width of 5-degree line (half)

  osdCtx.save();
  osdCtx.translate(cx, cy);
  osdCtx.rotate(-roll * Math.PI / 180);

  // Clip to a circle to keep it tidy
  osdCtx.beginPath();
  osdCtx.arc(0, 0, Math.min(W, H) * 0.38, 0, Math.PI * 2);
  osdCtx.clip();

  const pitchOff = pitch * PX_PER_DEG;
  const bigSize = Math.max(W, H) * 1.5;

  // Sky
  osdCtx.fillStyle = 'rgba(20, 60, 120, 0.45)';
  osdCtx.fillRect(-bigSize, -bigSize, bigSize * 2, bigSize + pitchOff);

  // Ground
  osdCtx.fillStyle = 'rgba(100, 65, 20, 0.45)';
  osdCtx.fillRect(-bigSize, pitchOff, bigSize * 2, bigSize);

  // Horizon line
  osdCtx.strokeStyle = '#fff';
  osdCtx.lineWidth = 1.5;
  osdCtx.globalAlpha = 0.9;
  osdCtx.beginPath();
  osdCtx.moveTo(-bigSize, pitchOff);
  osdCtx.lineTo(bigSize, pitchOff);
  osdCtx.stroke();
  osdCtx.globalAlpha = 1;

  // ── Pitch ladder ──
  // Draw lines every 5 degrees from -30 to +30
  osdCtx.font = 'bold 10px "Courier New"';
  for (let deg = -30; deg <= 30; deg += 5) {
    if (deg === 0) continue;
    const y = pitchOff - deg * PX_PER_DEG;
    const is10 = deg % 10 === 0;
    const hw = is10 ? LADDER_W_10 : LADDER_W_5;

    osdCtx.lineWidth = is10 ? 1.5 : 1;
    osdCtx.globalAlpha = is10 ? 0.85 : 0.55;

    if (deg > 0) {
      // Above horizon — solid lines
      osdCtx.strokeStyle = '#fff';
      osdCtx.beginPath();
      osdCtx.moveTo(-hw, y); osdCtx.lineTo(hw, y);
      osdCtx.stroke();
      // End ticks pointing down toward horizon
      osdCtx.beginPath();
      osdCtx.moveTo(-hw, y); osdCtx.lineTo(-hw, y + 6);
      osdCtx.moveTo( hw, y); osdCtx.lineTo( hw, y + 6);
      osdCtx.stroke();
    } else {
      // Below horizon — dashed lines
      osdCtx.strokeStyle = '#ddd';
      osdCtx.setLineDash([8, 5]);
      osdCtx.beginPath();
      osdCtx.moveTo(-hw, y); osdCtx.lineTo(hw, y);
      osdCtx.stroke();
      osdCtx.setLineDash([]);
      // End ticks pointing up toward horizon
      osdCtx.beginPath();
      osdCtx.moveTo(-hw, y); osdCtx.lineTo(-hw, y - 6);
      osdCtx.moveTo( hw, y); osdCtx.lineTo( hw, y - 6);
      osdCtx.stroke();
    }

    // Degree labels on 10-degree lines
    if (is10) {
      osdCtx.globalAlpha = 0.8;
      osdCtx.fillStyle = '#fff';
      osdCtx.textAlign = 'right';
      osdCtx.fillText(Math.abs(deg), -hw - 6, y + 4);
      osdCtx.textAlign = 'left';
      osdCtx.fillText(Math.abs(deg), hw + 6, y + 4);
    }
  }

  osdCtx.globalAlpha = 1;
  osdCtx.restore();

  // ── Fixed aircraft crosshair (not rotated) ──
  osdCtx.strokeStyle = '#fff';
  osdCtx.lineWidth = 2.5;
  osdCtx.beginPath();
  // Left wing
  osdCtx.moveTo(cx - 55, cy); osdCtx.lineTo(cx - 15, cy);
  osdCtx.lineTo(cx - 15, cy + 6);
  // Right wing
  osdCtx.moveTo(cx + 55, cy); osdCtx.lineTo(cx + 15, cy);
  osdCtx.lineTo(cx + 15, cy + 6);
  // Centre dot
  osdCtx.stroke();
  osdCtx.beginPath();
  osdCtx.arc(cx, cy, 3, 0, Math.PI * 2);
  osdCtx.fillStyle = '#fff';
  osdCtx.fill();
}

// ── Bank angle arc ────────────────────────────────────────────────────────────

function drawBankArc(cx, cy, roll, H) {
  const R = Math.min(cx, cy) * 0.52;
  const arcTop = cy - R * 0.72;
  const TICKS = [10, 20, 30, 45, 60]; // degrees

  osdCtx.save();
  osdCtx.translate(cx, cy);

  // Arc
  osdCtx.beginPath();
  osdCtx.arc(0, 0, R * 0.72, -Math.PI * 0.75, -Math.PI * 0.25);
  osdCtx.strokeStyle = 'rgba(255,255,255,0.5)';
  osdCtx.lineWidth = 1.5;
  osdCtx.stroke();

  // Tick marks
  TICKS.forEach(deg => {
    [-deg, deg].forEach(d => {
      const angle = -Math.PI / 2 + d * Math.PI / 180;
      const r1 = R * 0.72;
      const r2 = r1 - (deg % 30 === 0 ? 10 : 6);
      osdCtx.beginPath();
      osdCtx.moveTo(Math.cos(angle) * r1, Math.sin(angle) * r1);
      osdCtx.lineTo(Math.cos(angle) * r2, Math.sin(angle) * r2);
      osdCtx.strokeStyle = 'rgba(255,255,255,0.6)';
      osdCtx.lineWidth = 1.5;
      osdCtx.stroke();
    });
  });

  // Centre top tick (0° reference)
  osdCtx.beginPath();
  osdCtx.moveTo(0, -R * 0.72);
  osdCtx.lineTo(0, -R * 0.72 + 10);
  osdCtx.strokeStyle = 'rgba(255,255,255,0.7)';
  osdCtx.lineWidth = 1.5;
  osdCtx.stroke();

  // Roll triangle pointer — rotates with roll
  osdCtx.rotate(-roll * Math.PI / 180);
  const pr = R * 0.72 - 14;
  osdCtx.beginPath();
  osdCtx.moveTo(0, -pr - 10);
  osdCtx.lineTo(-6, -pr);
  osdCtx.lineTo(6, -pr);
  osdCtx.closePath();
  osdCtx.fillStyle = '#fff';
  osdCtx.fill();

  osdCtx.restore();
}

// ── Scrolling altitude tape ───────────────────────────────────────────────────

function drawAltTape(x, cy, tw, th, alt) {
  const PX_PER_M = 4;
  const halfH = th / 2;

  osdCtx.fillStyle = 'rgba(0,0,0,0.55)';
  osdCtx.fillRect(x, cy - halfH, tw, th);

  // Clip to tape area
  osdCtx.save();
  osdCtx.beginPath();
  osdCtx.rect(x, cy - halfH, tw, th);
  osdCtx.clip();

  // Draw tick marks and labels
  const step = 2; // every 2m a tick
  const range = Math.ceil(halfH / PX_PER_M / step) * step + step;
  const baseAlt = Math.round(alt / step) * step;

  osdCtx.font = '10px "Courier New"';
  for (let a = baseAlt - range; a <= baseAlt + range; a += step) {
    const y = cy - (a - alt) * PX_PER_M;
    if (a % 10 === 0) {
      osdCtx.strokeStyle = 'rgba(255,255,255,0.6)';
      osdCtx.lineWidth = 1;
      osdCtx.beginPath();
      osdCtx.moveTo(x, y); osdCtx.lineTo(x + 10, y);
      osdCtx.stroke();
      osdCtx.fillStyle = 'rgba(255,255,255,0.7)';
      osdCtx.textAlign = 'left';
      osdCtx.fillText(a, x + 13, y + 4);
    } else {
      osdCtx.strokeStyle = 'rgba(255,255,255,0.3)';
      osdCtx.lineWidth = 1;
      osdCtx.beginPath();
      osdCtx.moveTo(x, y); osdCtx.lineTo(x + 6, y);
      osdCtx.stroke();
    }
  }
  osdCtx.restore();

  // Current value box
  const boxH = 20;
  osdCtx.fillStyle = '#fff';
  osdCtx.fillRect(x, cy - boxH / 2, tw, boxH);
  osdCtx.fillStyle = '#000';
  osdCtx.font = 'bold 13px "Courier New"';
  osdCtx.textAlign = 'center';
  osdCtx.fillText(Math.round(alt), x + tw / 2, cy + 5);

  // Label
  drawText('ALT', x + tw / 2, cy - halfH - 5, '#888', 10, 'center');
  drawText('m', x + tw / 2, cy + halfH + 14, '#888', 10, 'center');
}

// ── Scrolling speed tape ──────────────────────────────────────────────────────

function drawSpeedTape(x, cy, tw, th, speed) {
  const PX_PER_KMH = 3;
  const halfH = th / 2;

  osdCtx.fillStyle = 'rgba(0,0,0,0.55)';
  osdCtx.fillRect(x - tw, cy - halfH, tw, th);

  osdCtx.save();
  osdCtx.beginPath();
  osdCtx.rect(x - tw, cy - halfH, tw, th);
  osdCtx.clip();

  const step = 5;
  const range = Math.ceil(halfH / PX_PER_KMH / step) * step + step;
  const baseSpd = Math.round(speed / step) * step;

  osdCtx.font = '10px "Courier New"';
  for (let v = baseSpd - range; v <= baseSpd + range; v += step) {
    if (v < 0) continue;
    const y = cy - (v - speed) * PX_PER_KMH;
    if (v % 10 === 0) {
      osdCtx.strokeStyle = 'rgba(255,255,255,0.6)';
      osdCtx.lineWidth = 1;
      osdCtx.beginPath();
      osdCtx.moveTo(x, y); osdCtx.lineTo(x - 10, y);
      osdCtx.stroke();
      osdCtx.fillStyle = 'rgba(255,255,255,0.7)';
      osdCtx.textAlign = 'right';
      osdCtx.fillText(v, x - 13, y + 4);
    } else {
      osdCtx.strokeStyle = 'rgba(255,255,255,0.3)';
      osdCtx.lineWidth = 1;
      osdCtx.beginPath();
      osdCtx.moveTo(x, y); osdCtx.lineTo(x - 6, y);
      osdCtx.stroke();
    }
  }
  osdCtx.restore();

  // Current value box
  const boxH = 20;
  osdCtx.fillStyle = '#fff';
  osdCtx.fillRect(x - tw, cy - boxH / 2, tw, boxH);
  osdCtx.fillStyle = '#000';
  osdCtx.font = 'bold 13px "Courier New"';
  osdCtx.textAlign = 'center';
  osdCtx.fillText(Math.round(speed), x - tw / 2, cy + 5);

  drawText('SPD', x - tw / 2, cy - halfH - 5, '#888', 10, 'center');
  drawText('km/h', x - tw / 2, cy + halfH + 14, '#888', 10, 'center');
}

// ── Vario bar (vertical speed) ────────────────────────────────────────────────

function drawVarioBar(x, cy, bw, bh, vspeed) {
  const halfH = bh / 2;
  const maxV  = 5; // m/s full scale

  // Background
  osdCtx.fillStyle = 'rgba(0,0,0,0.55)';
  osdCtx.fillRect(x, cy - halfH, bw, bh);

  // Fill from centre
  const fillH = Math.min(Math.abs(vspeed) / maxV, 1) * halfH;
  osdCtx.fillStyle = vspeed >= 0 ? 'rgba(80,255,80,0.75)' : 'rgba(255,80,80,0.75)';
  if (vspeed >= 0) {
    osdCtx.fillRect(x, cy - fillH, bw, fillH);
  } else {
    osdCtx.fillRect(x, cy, bw, fillH);
  }

  // Centre line
  osdCtx.strokeStyle = 'rgba(255,255,255,0.4)';
  osdCtx.lineWidth = 1;
  osdCtx.beginPath();
  osdCtx.moveTo(x, cy); osdCtx.lineTo(x + bw, cy);
  osdCtx.stroke();

  // Value label
  const vs = vspeed.toFixed(1);
  const vsColor = vspeed > 0.2 ? '#4f4' : vspeed < -0.2 ? '#f66' : '#aaa';
  drawText(vs, x + bw / 2, cy - halfH - 14, vsColor, 9, 'center');
  drawText('V', x + bw / 2, cy + halfH + 14, '#555', 9, 'center');
}

// ── Throttle bar ──────────────────────────────────────────────────────────────
// No throttle from telemetry yet — shows placeholder
// When RC channel data is added this will show real throttle %

function drawThrottleBar(x, cy, bw, bh, placeholder) {
  const halfH = bh / 2;
  // Placeholder: derive from vspeed for visual interest
  const thr = Math.max(0, Math.min(1, 0.5 + placeholder / 10));

  osdCtx.fillStyle = 'rgba(0,0,0,0.55)';
  osdCtx.fillRect(x, cy - halfH, bw, bh);

  // Fill from bottom
  const fillH = thr * bh;
  osdCtx.fillStyle = 'rgba(80,180,255,0.65)';
  osdCtx.fillRect(x, cy + halfH - fillH, bw, fillH);

  osdCtx.strokeStyle = 'rgba(255,255,255,0.4)';
  osdCtx.lineWidth = 1;

  drawText('T', x + bw / 2, cy - halfH - 5, '#555', 9, 'center');
  drawText(`${Math.round(thr * 100)}`, x + bw / 2, cy + halfH + 14, '#4af', 9, 'center');
}

// ── Compass tape ──────────────────────────────────────────────────────────────

// ── Home bearing arrow ────────────────────────────────────────────────────────

function drawHomeArrow(x, y, homeBearing, heading) {
  const relAngle = ((homeBearing - heading) + 360) % 360;
  const rad = (relAngle - 90) * Math.PI / 180;
  const len = 14;
  osdCtx.save();
  osdCtx.translate(x + 8, y);
  osdCtx.rotate(rad);
  osdCtx.strokeStyle = '#4af';
  osdCtx.fillStyle   = '#4af';
  osdCtx.lineWidth   = 2;
  osdCtx.beginPath();
  osdCtx.moveTo(0, len / 2); osdCtx.lineTo(0, -len / 2);
  osdCtx.stroke();
  osdCtx.beginPath();
  osdCtx.moveTo(0, -len / 2);
  osdCtx.lineTo(-4, -len / 2 + 6);
  osdCtx.lineTo( 4, -len / 2 + 6);
  osdCtx.closePath();
  osdCtx.fill();
  osdCtx.restore();
}

// ── Compass tape ──────────────────────────────────────────────────────────────

function drawCompass(cx, cy, heading, homeBearing, homeSet) {
  const TW = 220, TH = 24;
  const DEG_PER_PX = 0.5;

  osdCtx.fillStyle = 'rgba(0,0,0,0.55)';
  osdCtx.fillRect(cx - TW / 2, cy - TH / 2, TW, TH);

  osdCtx.save();
  osdCtx.beginPath();
  osdCtx.rect(cx - TW / 2, cy - TH / 2, TW, TH);
  osdCtx.clip();

  const CARDINALS = { 0:'N', 45:'NE', 90:'E', 135:'SE', 180:'S', 225:'SW', 270:'W', 315:'NW' };

  for (let d = -120; d <= 120; d += 5) {
    const deg = ((heading + d) + 360) % 360;
    const px  = cx + d / DEG_PER_PX;
    const is45 = deg % 45 === 0;
    const is10 = deg % 10 === 0;

    if (is45) {
      osdCtx.strokeStyle = 'rgba(255,255,255,0.8)';
      osdCtx.lineWidth = 1.5;
      osdCtx.beginPath();
      osdCtx.moveTo(px, cy - TH / 2); osdCtx.lineTo(px, cy + TH / 2);
      osdCtx.stroke();
      const label = CARDINALS[deg];
      osdCtx.fillStyle = deg === 0 ? '#f55' : '#ddd';
      osdCtx.font = 'bold 11px "Courier New"';
      osdCtx.textAlign = 'center';
      osdCtx.fillText(label, px, cy + 5);
    } else if (is10) {
      osdCtx.strokeStyle = 'rgba(255,255,255,0.35)';
      osdCtx.lineWidth = 1;
      osdCtx.beginPath();
      osdCtx.moveTo(px, cy - TH / 2 + 5); osdCtx.lineTo(px, cy + TH / 2 - 5);
      osdCtx.stroke();
    }
  }

  // Home 'H' marker on tape
  if (homeSet) {
    const delta = ((homeBearing - heading) + 360) % 360;
    const adj   = delta > 180 ? delta - 360 : delta;
    const hpx   = cx + adj / DEG_PER_PX;
    if (Math.abs(adj) <= 120) {
      osdCtx.fillStyle = '#4af';
      osdCtx.font = 'bold 11px "Courier New"';
      osdCtx.textAlign = 'center';
      osdCtx.fillText('H', hpx, cy + 5);
      osdCtx.beginPath();
      osdCtx.moveTo(hpx,     cy - TH / 2 - 1);
      osdCtx.lineTo(hpx - 4, cy - TH / 2 - 7);
      osdCtx.lineTo(hpx + 4, cy - TH / 2 - 7);
      osdCtx.closePath();
      osdCtx.fillStyle = '#4af';
      osdCtx.fill();
    }
  }

  osdCtx.restore();

  // Centre pointer
  osdCtx.strokeStyle = '#fff';
  osdCtx.lineWidth = 2;
  osdCtx.beginPath();
  osdCtx.moveTo(cx, cy - TH / 2 - 1);
  osdCtx.lineTo(cx, cy - TH / 2 - 7);
  osdCtx.stroke();

  drawText(`${Math.round(heading).toString().padStart(3,'0')}°`, cx, cy - TH / 2 - 18, '#fff', 12, 'center');
}

requestAnimationFrame(drawOsd);

// TELEMETRY PANEL UPDATE
// ═══════════════════════════════════════════════════════
function updateTelemPanel(s) {
  set('t-alt',   `${s.altitude_m.toFixed(1)} m`);
  set('t-spd',   `${s.speed_kmh.toFixed(1)} km/h`);
  set('t-vspd',  `${s.vspeed_ms.toFixed(2)} m/s`);
  set('t-hdg',   `${s.heading.toFixed(1)}°`);
  const bv = s.voltage_v.toFixed(2) + ' V';
  const be = document.getElementById('t-batt');
  be.textContent = bv;
  be.className = 'telem-val' + (s.voltage_v < 14.4 ? ' crit' : s.voltage_v < 15.2 ? ' warn' : ' ok');
  set('t-curr',  `${s.current_a.toFixed(1)} A`);
  set('t-mah',   `${s.used_mah} mAh`);
  set('t-sats',  s.satellites);
  set('t-lat',   s.lat.toFixed(6));
  set('t-lon',   s.lon.toFixed(6));
  set('t-pitch', `${s.pitch_deg.toFixed(1)}°`);
  set('t-roll',  `${s.roll_deg.toFixed(1)}°`);

  // Topbar
  const pill = document.getElementById('arm-pill');
  pill.textContent = s.armed ? 'ARMED' : 'DISARMED';
  pill.className = 'status-pill ' + (s.failsafe ? 'pill-fs' : s.armed ? 'pill-armed' : 'pill-disarmed');
  document.getElementById('mode-badge').textContent = s.flight_mode;
  document.getElementById('lq-display').textContent = `LQ: ${s.link_quality}%`;
  document.getElementById('rssi-display').textContent = `RSSI: ${s.rssi_dbm} dBm`;
}

function set(id, val) {
  const el = document.getElementById(id);
  if (el) el.textContent = val;
}

// ═══════════════════════════════════════════════════════
// WEBSOCKET — TELEMETRY
// ═══════════════════════════════════════════════════════
function connectTelemetry() {
  const ws = new WebSocket(`ws://${location.host}/ws/telemetry`);
  const dot = document.getElementById('ws-dot');
  const lbl = document.getElementById('ws-label');

  ws.onopen = () => {
    dot.className = 'connected';
    lbl.textContent = 'Connected';
  };
  ws.onmessage = (ev) => {
    try {
      const d = JSON.parse(ev.data);
      Object.assign(state, d);
      updateTelemPanel(state);
      updateMap(state.lat, state.lon, state.heading, state.home_lat, state.home_lon, state.home_set);
    } catch(e) {}
  };
  ws.onclose = ws.onerror = () => {
    dot.className = 'error';
    lbl.textContent = 'Reconnecting…';
    setTimeout(connectTelemetry, 2000);
  };
}
connectTelemetry();

// ═══════════════════════════════════════════════════════
// WEBSOCKET — VIDEO (H.265 via WebCodecs)
// ═══════════════════════════════════════════════════════
const videoCanvas = document.getElementById('video-canvas');
const videoCtx    = videoCanvas.getContext('2d');
const noVideo     = document.getElementById('no-video');

let decoder     = null;
let decoderReady = false;

// Parameter sets collected from stream
let vps = null, sps = null, pps = null;

function nalType(byte0) {
  return (byte0 >> 1) & 0x3F;
}

// Build hvcC description from VPS/SPS/PPS for WebCodecs
function buildHvcC(vps, sps, pps) {
  // Minimal hvcC box content for WebCodecs description field
  // Format: array of NAL arrays, each prefixed with 4-byte length
  const arrays = [
    { type: 32, nalus: [vps] },  // VPS
    { type: 33, nalus: [sps] },  // SPS
    { type: 34, nalus: [pps] },  // PPS
  ];

  let totalLen = 23; // hvcC header
  for (const arr of arrays) {
    totalLen += 3; // array completeness + nal_unit_type + num_nalus
    for (const n of arr.nalus) totalLen += 2 + n.length;
  }

  const buf = new Uint8Array(totalLen);
  const dv  = new DataView(buf.buffer);
  let off = 0;

  buf[off++] = 1;          // configurationVersion
  buf[off++] = sps[1];     // general_profile_space/tier/idc
  buf[off++] = sps[2];     // general_profile_compatibility
  buf[off++] = sps[3];
  buf[off++] = sps[4];
  buf[off++] = sps[5];
  // general_constraint_indicator_flags (6 bytes)
  buf[off++] = 0; buf[off++] = 0; buf[off++] = 0;
  buf[off++] = 0; buf[off++] = 0; buf[off++] = 0;
  buf[off++] = sps[6] || 0x5D; // general_level_idc (L93 = 0x5D)
  dv.setUint16(off, 0xF000); off += 2; // min_spatial_segmentation_idc
  buf[off++] = 0xFC;       // parallelismType
  buf[off++] = 0xFD;       // chroma_format_idc (4:2:0)
  buf[off++] = 0xF8;       // bit_depth_luma_minus8
  buf[off++] = 0xF8;       // bit_depth_chroma_minus8
  dv.setUint16(off, 0);  off += 2; // avgFrameRate
  buf[off++] = 0x0F;       // constantFrameRate|numTemporalLayers|temporalIdNested|lengthSizeMinusOne
  buf[off++] = arrays.length; // numOfArrays

  for (const arr of arrays) {
    buf[off++] = 0x80 | arr.type; // array_completeness + NAL type
    dv.setUint16(off, arr.nalus.length); off += 2;
    for (const n of arr.nalus) {
      dv.setUint16(off, n.length); off += 2;
      buf.set(n, off); off += n.length;
    }
  }

  return buf.slice(0, off);
}

async function configureDecoder() {
  if (!vps || !sps || !pps) return;
  if (decoderReady) return; // already configured, don't reset
  if (!('VideoDecoder' in window)) return;

  console.log('Configuring H.265 decoder...');

  if (decoder && decoder.state !== 'closed') {
    try { decoder.reset(); } catch(_) {}
  }

  decoder = new VideoDecoder({
    output: (frame) => {
      noVideo.style.display = 'none';
      videoCanvas.width  = frame.displayWidth;
      videoCanvas.height = frame.displayHeight;
      videoCtx.drawImage(frame, 0, 0);
      frame.close();
    },
    error: (e) => {
      if (decoder.state === 'closed') {
        decoderReady = false;
        setTimeout(() => configureDecoder(), 500);
      }
    }
  });

  const cfgs = [
    { codec: 'hev1.1.6.L93.B0',  hardwareAcceleration: 'prefer-hardware', optimizeForLatency: true },
    { codec: 'hev1.1.6.L120.B0', hardwareAcceleration: 'prefer-hardware', optimizeForLatency: true },
    { codec: 'hev1.1.6.L150.B0', hardwareAcceleration: 'prefer-hardware', optimizeForLatency: true },
    { codec: 'hev1.1.6.L93.B0',  hardwareAcceleration: 'prefer-software', optimizeForLatency: true },
  ];

  for (const cfg of cfgs) {
    try {
      const check = await VideoDecoder.isConfigSupported(cfg);
      if (!check.supported) continue;
      await decoder.configure(cfg);
      decoderReady = true;
      console.log('Decoder ready:', cfg.codec);
      return;
    } catch(e) {
      console.warn('Configure failed:', cfg.codec, e.message);
    }
  }
  console.error('H.265 not supported');
  noVideo.textContent = '⚠ H.265 not supported';
}

// Check support once on load
(async () => {
  if (!('VideoDecoder' in window)) {
    noVideo.textContent = '⚠ WebCodecs not supported — use Chrome';
    return;
  }
  const s = await VideoDecoder.isConfigSupported({ codec: 'hev1.1.6.L93.B0' });
  if (!s.supported) {
    noVideo.textContent = '⚠ H.265 not supported in this Chrome/OS';
  } else {
    console.log('H.265 WebCodecs supported');
  }
})();

function annexBWrap(nal) {
  const out = new Uint8Array(4 + nal.length);
  out[0] = 0; out[1] = 0; out[2] = 0; out[3] = 1;
  out.set(nal, 4);
  return out;
}

function processNal(nalData, isKeyHint) {
  if (!decoderReady || !decoder || decoder.state === 'closed') return;

  const nt = nalType(nalData[0]);
  const isIDR = nt >= 16 && nt <= 23;
  const isKey = isIDR || isKeyHint;

  let payload;
  if (isIDR && vps && sps && pps) {
    const v = annexBWrap(vps);
    const s = annexBWrap(sps);
    const p = annexBWrap(pps);
    const n = annexBWrap(nalData);
    payload = new Uint8Array(v.length + s.length + p.length + n.length);
    let off = 0;
    payload.set(v, off); off += v.length;
    payload.set(s, off); off += s.length;
    payload.set(p, off); off += p.length;
    payload.set(n, off);
  } else {
    payload = annexBWrap(nalData);
  }

  try {
    decoder.decode(new EncodedVideoChunk({
      type: isKey ? 'key' : 'delta',
      timestamp: performance.now() * 1000,
      data: payload,
    }));
  } catch(e) {
    // Silently drop — decoder recovers on next keyframe
  }
}

function connectVideo() {
  const ws = new WebSocket(`ws://${location.host}/ws/video`);
  ws.binaryType = 'arraybuffer';

  let lastFrameTime = performance.now();
  let fuBuffer = null;
  let fuNalType = 0;
  let fuStartTime = 0;

  // Watchdog: if no decoded frame for 3 seconds, reset decoder to force keyframe request
  const watchdog = setInterval(() => {
    if (performance.now() - lastFrameTime > 3000 && decoderReady) {
      console.log('Video watchdog: no frames for 3s, flushing decoder');
      fuBuffer = null; // discard stale FU-A buffer
      try { decoder.flush(); } catch(_) {}
    }
  }, 3000);

  ws.onmessage = (ev) => {
    const data = new Uint8Array(ev.data);
    if (data.length < 2) return;

    const nt = nalType(data[0]);

    // Parameter sets
    if (nt === 32) { vps = data.slice(); return; }
    if (nt === 33) { sps = data.slice(); return; }
    if (nt === 34) {
      pps = data.slice();
      if (!decoderReady) configureDecoder();
      return;
    }

    // FU-A reassembly (nalType 49)
    if (nt === 49) {
      const fuHeader = data[2];
      const startBit = (fuHeader >> 7) & 1;
      const endBit   = (fuHeader >> 6) & 1;
      const fuType   = fuHeader & 0x3F;

      if (startBit) {
        // Discard stale buffer if previous FU-A never completed
        const origNalHdr0 = (data[0] & 0x81) | (fuType << 1);
        const origNalHdr1 = data[1];
        fuBuffer = new Uint8Array(2 + data.length - 3);
        fuBuffer[0] = origNalHdr0;
        fuBuffer[1] = origNalHdr1;
        fuBuffer.set(data.slice(3), 2);
        fuNalType = fuType;
        fuStartTime = performance.now();
      } else if (fuBuffer) {
        // Discard if fragment is too old (>500ms = lost end packet)
        if (performance.now() - fuStartTime > 500) {
          fuBuffer = null;
          return;
        }
        const prev = fuBuffer;
        fuBuffer = new Uint8Array(prev.length + data.length - 3);
        fuBuffer.set(prev, 0);
        fuBuffer.set(data.slice(3), prev.length);

        if (endBit) {
          const nal = fuBuffer;
          fuBuffer = null;
          lastFrameTime = performance.now();
          processNal(nal, fuNalType >= 16 && fuNalType <= 23);
        }
      }
      return;
    }

    // Regular NAL unit
    lastFrameTime = performance.now();
    processNal(data, false);
  };

  ws.onclose = ws.onerror = () => {
    clearInterval(watchdog);
    fuBuffer = null;
    decoderReady = false;
    setTimeout(connectVideo, 2000);
  };
}
connectVideo();
